version: "3.9"

# Multi-tenant WordPress template.
# All tenant-specific values come from a .env file — see .env.example.
# Local dev:  docker compose up  (auto-merges docker-compose.override.yml)
# Production: docker compose -f docker-compose.yml -f docker-compose.https.yml \
#               --env-file /opt/orderbox-wp-<subdomain>/.env -p <subdomain> up -d

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: ${DB_PASSWORD:-wordpress}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: europe-west2-docker.pkg.dev/orderbox-487000/orderbox-images/orderbox-wordpress-base
    depends_on:
      - db
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME: wordpress
      ORDERBOX_API_URL: ${ORDERBOX_API_URL:-http://orderbox_api:3000}
      ORDERBOX_SUBDOMAIN: ${SUBDOMAIN:-demo}
    volumes:
      - wp_data:/var/www/html
      - ${MU_PLUGINS_PATH:-./mu-plugins}:/var/www/html/wp-content/mu-plugins

volumes:
  wp_data:
    name: wp_${SUBDOMAIN:-demo}_data
  db_data:
    name: db_${SUBDOMAIN:-demo}_data
