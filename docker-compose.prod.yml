version: "3.9"

# Production overrides — apply with:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  traefik:
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=joshua.cattaruzza@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"

  wordpress:
    environment:
      ORDERBOX_API_URL: https://orderbox-api-3e2wtmanta-nw.a.run.app
      ORDERBOX_SUBDOMAIN: rajmahal
    volumes:
      - ./mu-plugins:/var/www/html/wp-content/mu-plugins
    labels:
      - "traefik.http.routers.wp.entrypoints=websecure"
      - "traefik.http.routers.wp.tls.certresolver=letsencrypt"
      - "traefik.http.routers.wp.middlewares=redirect-to-https@docker"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
