version: "3.9"

# Local dev overrides — auto-merged by Docker Compose when running `docker compose up`.
# In prod, skip this file and use docker-compose.https.yml instead.

services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    labels:
      - "traefik.enable=true"
    networks:
      traefik_proxy:
        aliases:
          - api.orderbox.test

  wordpress:
    depends_on:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wp-${SUBDOMAIN:-demo}.rule=Host(`orderbox.test`)"
      - "traefik.http.routers.wp-${SUBDOMAIN:-demo}.entrypoints=web"
      - "traefik.docker.network=orderbox_net"
    networks:
      - default
      - traefik_proxy

networks:
  traefik_proxy:
    name: orderbox_net
    external: true
